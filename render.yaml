services:

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  - type: web
    name: damm-backend
    runtime: python
    rootDir: Hackaton_files
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false          # set manually in Render dashboard (secret)
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard (secret)
    healthCheckPath: /api/health

  # ── Frontend (React static site) ───────────────────────────────────────────
  - type: web
    name: damm-frontend
    runtime: static
    rootDir: damm-frontend
    buildCommand: npm ci && REACT_APP_API_URL=https://damm-backend.onrender.com npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
